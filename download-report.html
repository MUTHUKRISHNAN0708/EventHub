<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Project Report | EventHub</title>
    <style>
        :root {
            --primary: #c5a572;
            --secondary: #1a1a2e;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--secondary);
            color: var(--white);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon {
            font-size: 64px;
            margin-bottom: 24px;
            display: block;
        }

        h1 {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 16px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            font-size: 18px;
            opacity: 0.8;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--primary);
            color: var(--secondary);
            padding: 18px 48px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(197, 165, 114, 0.3);
        }

        .btn:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 20px 40px rgba(197, 165, 114, 0.4);
            background: #d4b88a;
        }

        .note {
            margin-top: 30px;
            font-size: 12px;
            opacity: 0.5;
            letter-spacing: 0.5px;
        }

        .decoration {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.1;
            z-index: -1;
        }

        .d1 { top: -100px; left: -100px; }
        .d2 { bottom: -100px; right: -100px; }
    </style>
</head>
<body>

    <div class="decoration d1"></div>
    <div class="decoration d2"></div>

    <div class="container">
        <span class="icon">📄</span>
        <h1>Project Portfolio</h1>
        <p>Your comprehensive 15-page EventHub technical report is ready. Click below to generate and download the PDF.</p>
        
        <a href="report.html" class="btn" target="_blank">
            Generate Report PDF
        </a>

        <div class="note">
            Tip: When the report opens, click the "Save as PDF" button at the top right.
        </div>
    </div>

</body>
</html>
